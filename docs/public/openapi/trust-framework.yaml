                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ],
          "SoftwareLogoUri": "https://mycompanyprofile.com/logo.png",
          "OrgStatus": "Active",
          "OrgId": "My Company's ID",
          "OrgName": "Registered Name",
          "OrgContacts": [
            {
              "name": "contact name",
              "email": "contact@contact.com",
              "phone": "+447890130558",
