            - AnnualFees
            - BalanceFallBelow
            - Overdraft
            - DomesticTransaction
            - ForeignTransaction
            - ATMWithdrawal
            - ChequeBook
            - ReplacementChequeBook
            - ReturnCheque
            - CardReplacement
            - AccountStatement
            - LetterIssued
            - AccountClosure
            - CashAdvance
            - LatePayment
            - BalanceTransfer
            - OverLimit
            - SalesVoucherCopy
            - Processing
            - FinanceCancellation
            - PartialPayment
            - EarlySettlement
            - FinalSettlement
            - Other
          Name:
            type: string
            description: Name of the charge
            minLength: 1
            maxLength: 40
          Description:
            description: Description of the fee, including purpose and applicability
            type: string
          Charge:
            description: Array of charge components including amount, currency, and applicable rate
            type: array
            items:
              $ref: '#/components/schemas/AEProductFinancialCalculationMeasure'
          Conditions:
            description: Array of conditions that trigger the fee
            type: array
            items:
              $ref: '#/components/schemas/AEProductConditions'
          Justification:
