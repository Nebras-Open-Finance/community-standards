    EnvelopeSummary:
      type: object
      description: Summary of the envelope
      x-required-message: data.envelopeSummary must be provided
      properties:
        status:
          type: string
          pattern: "^[^<>]*$"
          description: The status of the envelope
          x-required-message: data.envelopeSummary.status must be provided

    xFapiInteractionId:
      description: "An RFC4122 UID used as a correlation id."
      type: string
      pattern: '^[a-zA-Z0-9][a-zA-Z0-9\-]{0,99}$'
      minLength: 1
      maxLength: 100
      example: 73cac523-d3ae-2289-b106-330a6218710d
    HttpResponseBody:
      type: object
      properties:
        errors:
          type: array
          description: Validation Error messages
          items:
            type: string
    OpErrorResponseBody:
      type: object
      properties:
        error:
          type: string
          description: Validation Error
        error_description:
          type: string
          description: Validation Error description
    UserUpdateRequest:
      type: object
      properties:
        Status:
          $ref: '#/components/schemas/StatusEnum'
      required:
        - Status
    GlobalSearchStatusEnum:
      type: string
      default: Active
      description: Status of the resource
      enum:
