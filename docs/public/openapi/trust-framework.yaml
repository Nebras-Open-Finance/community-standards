                    "Status": "Active"
                  },
                  {
                    "Role": "ASPSP",
                    "Status": "Active"
                  }
                ]
              }
            ]
          },
          "OrganisationAuthorityClaims": [
            {
              "AuthorityId": "123",
              "RegistrationId": "111111",
              "AuthorisationDomains": [
                {
                  "AuthorisationDomain": "PDS2",
                  "Roles": [
                    {
                      "Role": "ASPSP",
