      type: string
      pattern: "^[^<>]*$"
      maxLength: 36
      description: The id of the metadata policy

    MetadataPolicyTypeEnum:
      type: string
      pattern: "^[^<>]*$"
      description: The type of the metadata policy
      x-required-message: Type must be provided
      enum:
