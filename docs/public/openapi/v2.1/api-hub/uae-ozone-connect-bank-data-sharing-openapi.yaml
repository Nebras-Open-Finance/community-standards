            - Business
            - Correspondence
            - DeliveryTo
            - MailTo
            - POBox
            - Postal
            - Permanent
            - Residential
            - Statement
            - Other
        addressLine:
          description: >-
            Information that locates and identifies a specific address for a transaction entry, that is presented in
            free format text.
          type: array
          minItems: 1
          maxItems: 7
          items:
            type: string
            minLength: 1
            maxLength: 70
        buildingNumber:
          description: The unit, apartment, or villa number within a building or community
          type: string
          minLength: 1
          maxLength: 16
        buildingName:
          description: Name of the building or house.
          type: string
          minLength: 1
          maxLength: 140
        floor:
