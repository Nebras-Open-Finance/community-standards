openapi: 3.0.0
info:
  description: Raidiam Connect API
  license:
    name: MIT
    url: https://mit-license.org
  contact:
    email: support@raidiam.com
  title: Raidiam Connect
  version: "1.39.0"
servers:
  - description: Raidiam Directory Sandbox Environment
    url: https://matls-api.sandbox.raidiam.io

tags:
