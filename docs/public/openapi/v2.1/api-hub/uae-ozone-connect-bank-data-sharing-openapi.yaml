        meta:
          $ref: '#/components/schemas/Meta'
      description: The properties of a direct debit.
    DirectDebitStatusEnum:
      description: Specifies the status of the direct debit.
      type: string
      enum:
        - Active
        - Inactive
    CbuaeDirectDebit:
      type: object
